training:
  data_sample_fraction: 0.05
  test_size: 0.2

evaluation:
  top_n: 10
  relevance_threshold: 4.5

preprocessing:
  min_movie_ratings: 50
  min_user_ratings: 10

svd:
  # Default hyperparameters (used when optimize: false)
  n_factors: 100
  n_epochs: 20
  lr_all: 0.005
  reg_all: 0.02
  # Optuna search space
  optimize: true
  n_trials: 30
  search_space:
    n_factors: [20, 100]
    n_epochs: [5, 50]
    lr_all: [0.0001, 0.1]
    reg_all: [0.0001, 0.1]

ncf:
  emb_size: 32
  batch_size: 1024
  epochs: 5
  lr: 0.001
  weight_decay: 0.0001
