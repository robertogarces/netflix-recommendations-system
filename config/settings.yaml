seed: 42

data:
  num_raw_files: 4
  rating_scale: [1.0, 5.0]

training:
  data_sample_fraction: 0.1
  val_size: 0.1
  test_size: 0.2

evaluation:
  top_n: 10
  relevance_threshold: 4.5

recommend:
  top_k: 10
  user_batch_size: 128            # users scored per forward pass (memory vs speed on 8GB)
  qualifying_sample_fraction: 0.01  # fraction of qualifying.txt users to recommend for (legibility)

preprocessing:
  min_movie_ratings: 50
  min_user_ratings: 10

ncf:
  emb_size: 64
  hidden_dims: [64, 32]
  dropout: 0.3
  batch_size: 32768
  epochs: 15
  early_stopping_patience: 3
  lr: 0.002
  weight_decay: 0.00001
