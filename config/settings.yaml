seed: 42

data:
  num_raw_files: 4
  rating_scale: [1.0, 5.0]

preprocessing:
  min_movie_ratings: 50
  min_user_ratings: 10

training:
  data_sample_fraction: 0.1   # fraction of users sampled (each keeps full history)
  test_size: 0.2              # temporal hold-out fraction (newest ratings)

# Surprise SVD (Funk matrix factorization) hyperparameters.
# Surprise runs plain SGD for a fixed n_epochs; lr_all / reg_all are the global
# learning rate and L2 regularization applied to all factors and biases.
svd:
  n_factors: 100
  n_epochs: 20
  lr_all: 0.005
  reg_all: 0.02

evaluation:
  top_n: 10
  relevance_threshold: 4.5

recommend:
  top_k: 10
  qualifying_sample_fraction: 0.01  # fraction of qualifying.txt users to recommend for (legibility)
